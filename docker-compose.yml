version: "3.8"

services:
  # ── Runs `prisma db push` once on every stack start ────────────
  migrate:
    build:
      context: .
      target: migrate           # uses the lightweight migrate stage
    container_name: seevak-care-migrate
    env_file: .env.local
    depends_on:
      db:
        condition: service_healthy
    restart: "no"               # run once and exit

  app:
    build: .
    container_name: seevak-care
    ports:
      - "3000:3000"
    env_file: .env.local
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: seevak-care-db
    environment:
      POSTGRES_DB:       seevakcare
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout:  5s
      retries:  5

volumes:
  pgdata:
